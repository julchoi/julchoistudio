<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { cursor: auto; }

        .cursor {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none;
            transform: translate(-50%,-50%);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s ease;
        }
        .cursor img { width: 24px; height: 24px; }
        .cursor.visible { opacity: 1; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', sans-serif;
            font-weight: 400; color: #fff;
            background-color: #222;
            background-image:
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-font-smoothing: antialiased;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow-y: scroll;
        }

        a { text-decoration: none; color: inherit; }

        /* ── NAV ── */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 52px;
            border-bottom: 1px solid #333;
            background: #222;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .nav-links { display: flex; align-items: center; gap: 2.2rem; }
        .nav-links a {
            font-size: 0.8rem; font-weight: 500; color: #aaa;
            text-transform: uppercase; transition: color 0.2s;
        }
        .nav-links a.active { color: #5D4FF6; }
        .nav-links a:hover  { color: #fff; }

        /* ── STAGE ── */
        .stage {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .stage::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, transparent 70%);
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
        }

        /* ── FILMSTRIP WRAP ──
           Fixed height so vertical layout expansion doesn't reflow the stage.
           Items grow upward (align-items: flex-end) from a stable baseline.
           overflow-y becomes auto (browser forces it when overflow-x is scroll),
           but the tallest content (360px) fits within 400px so nothing clips. ── */
        .filmstrip-wrap {
            width: calc(100% - 3rem);
            height: 600px;
            display: flex;
            position: relative;
            z-index: 1;
            margin-top: -5%;  /* negative pulls slightly above true center — adjust this value */
            margin-left: 1.5rem;
            margin-right: 1.5rem;
            align-items: center;
            overflow-x: scroll;
            overflow-y: hidden;
            cursor: grab;
            user-select: none;
            scrollbar-width: none;
        }
        

        /* ── FILMSTRIP ── */
        .filmstrip {
            display: flex;
            gap: 12px;
            align-items: center;   /* items share the same bottom edge */
            width: max-content;
            flex-shrink: 0;
        }

        /* ── FILM ITEM: expands in layout → pushes siblings sideways ── */
        .film-item {
            flex-shrink: 0;
            width: 160px;
            height: 160px;
            overflow: visible;      /* allow caption to show outside image bounds */
            cursor: pointer;
            position: relative;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1),
                        height 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        .film-item.active {
            width: 360px;
            height: 400px;
        }

        /* hover effect — enlarges whichever image is hovered */
        .film-item:hover {
            width: 360px;
            height: 400px;
        }

        /* when hovering any image, shrink the scroll-active one (unless it's the hovered one) */
        .filmstrip-wrap.item-hovered .film-item.active:not(:hover) {
            width: 160px;
            height: 160px;
        }

        /* wraps the image and clips it to the item size */
        .film-thumb {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .film-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* ── CAPTION — below the image ── */
        .film-caption {
            position: absolute;
            top: 100%;              /* just below the image */
            left: 0; right: 0;
            padding: 0.7rem 0 0;
            background: transparent;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .film-item.active .film-caption,
        .film-item:hover .film-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* hide active caption when another image is hovered */
        .filmstrip-wrap.item-hovered .film-item.active:not(:hover) .film-caption {
            opacity: 0;
            transform: translateY(4px);
        }

        .cap-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: #111;
            background: #fff;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            white-space: nowrap;
        }

        .cap-meta {
            font-family: 'Geist Mono', monospace;
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
            border: 1px solid #aaa;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
        }

        /* ── TOGGLE — pinned to bottom of stage ── */
        .toggle-bar {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.9rem;
            white-space: nowrap;
        }

        .toggle-label {
            font-family: 'Geist Mono', monospace;
            font-size: 0.72rem; font-weight: 400;
            color: #aaa;
            text-transform: uppercase; letter-spacing: 0.08em;
            transition: color 0.25s;
        }
        .toggle-label.active { color: #aaa; }

        .toggle-track {
            width: 80px; height: 24px;
            background: transparent;
            border: 1.5px solid #ccc;
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: border-color 0.25s;
            flex-shrink: 0;
        }
        .toggle-track.on { border-color: #ccc; }

        .toggle-thumb {
            width: 18px; height: 18px;
            background: #b0b0b0;
            border-radius: 50%;
            position: absolute; top: 50%; left: 5px;
            transform: translateY(-50%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .toggle-track.on .toggle-thumb { transform: translateY(-50%) translateX(52px); }

        /* ── OVERLAY ── */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }

        .lb-inner {
            background: #fafcfd;
            width: 80vw;
            height: 78vh;
            display: grid;
            grid-template-columns: 32% 1fr;
            overflow: hidden;
            position: relative;
            border-radius: 5px;
        }

        /* Left panel — fixed text */
        .lb-left {
            padding: 2.5rem 2.5rem;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            overflow-y: auto;
        }

        .lb-tag {
            font-family: 'Geist Mono', monospace;
            font-size: 0.72rem;
            color: #aaa;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .lb-title {
            font-size: 2.5rem;
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: -0.03em;
            color: #33363F;
        }

        .lb-rule {
            border: none;
            border-top: 1px solid #e0e0e0;
        }

        .lb-desc {
            font-size: 0.85rem;
            line-height: 1.75;
            color: #666;
        }

        /* Right panel — scrollable images */
        .lb-right {
            overflow-y: scroll;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .lb-right img,
        .lb-right video {
            width: 100%;
            height: auto;
            display: block;
        }

        .lb-row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .lb-close {
            position: absolute; top: 1.2rem; right: 1.5rem;
            background: #fff; border: none;
            color: #aaa; font-size: 1.1rem;
            cursor: pointer; z-index: 10;
            transition: color 0.2s, background 0.2s; line-height: 1;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-close:hover { color: #000; background: #f0f0f0; }

        /* ── MOBILE MENU BUTTON ── */
        .m-menu-btn {
            display: none;
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.8);
            border: none;
            font-family: 'Geist', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            color: #33363F;
            padding: 0.85rem 2.3rem;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            z-index: 150;
            cursor: pointer;
        }

        /* ── MOBILE NAV PANEL ── */
        .m-nav {
            display: none;
            position: fixed;
            bottom: 5rem;
            left: 1.2rem;
            right: 1.2rem;
            background: rgba(250,252,253,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            z-index: 200;
            flex-direction: column;
            padding: 1.5rem;
            gap: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .m-nav.active { display: flex; }

        .m-nav-close {
            background: none; border: none;
            font-size: 1.2rem; cursor: pointer;
            align-self: flex-end; color: #33363F;
            position: absolute; top: 1.5rem; right: 1.5rem;
        }

        .m-nav-links {
            display: flex; flex-direction: column;
            gap: 0.2rem; flex: 1; margin-bottom: 3rem;
        }
        .m-nav-links a {
            font-size: 1.5rem; font-weight: 500;
            color: #33363F; letter-spacing: -0.01em;
        }

        .m-nav-footer { display: flex; flex-direction: column; gap: 0.3rem; }
        .m-nav-footer a {
            font-family: 'Geist Mono', monospace;
            font-size: 0.8rem; color: #aaa;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .nav-links   { display: none; }
            .m-menu-btn  { display: block; }
            .filmstrip-wrap { height: 400px; width: calc(100% - 2rem); margin-top: -11%; }
            .film-item   { width: 120px; height: 120px; }
            .filmstrip   { gap: 8px; }
            .toggle-bar  { bottom: 6.5rem; }
            .film-item.active,
            .film-item:hover { width: 240px; height: 260px; }
            .filmstrip-wrap.item-hovered .film-item.active:not(:hover) { width: 120px; height: 120px; }
            .cursor { display: none; }
        }
    </style>
</head>

    <script>
    (() => {

        const SOURCES = [

                desc: 'An AI-powered communication platform designed to help immigrant families truly understand each other by translating not only language, but also tone, emotion, and cultural meaning.',
                images: [
                    'assets/images/Fun/6/vid1.mov',

                    'assets/images/Fun/6/vid.mp4',

                ],
            },
            {
                src: 'assets/images/Fun/7.png', title: 'MORII', meta: 'EDITORIAL · 2025',
                desc: 'MORII captures fleeting moments through thoughtfully curated unique interiors. The magazine design includes main spreads and 2 different feature pages.',
                images: [
                    'assets/images/Fun/7/Main.png',
                    'assets/images/Fun/7/1-1.png',
                    'assets/images/Fun/7/3.jpg',
                    'assets/images/Fun/7/1.png',

                ],
            },
            {
                src: 'assets/images/Fun/8.png', title: 'AHOLE', meta: 'TYPEFACE · 2024',
                desc: 'Introducing a custom typeface, ”AHOLE,” a revolutionary interpretation of a square yet circular typeface. Typically, the term “A-hole” is employed as an expletive. However, in this context, it assumes a dual significance.',
                images: [
                    'assets/images/Fun/8/Main.png',
                    'assets/images/Fun/8/3-3.png',
                    'assets/images/Fun/8/1.png',
                    'assets/images/Fun/8/2.png',
                    'assets/images/Fun/8/3.png',
                    'assets/images/Fun/8/4.png',
                ],
            },
            {
                src: 'assets/images/Fun/9.png', title: 'Un-algorithmic', meta: 'TAROT CARDS · 2026',
                desc: 'An un-algorithmic tarot card series designed as a counter-narrative to algorithmic prediction and digital fate.',
                images: [
                    'assets/images/Fun/9/Main.png',
                    'assets/images/Fun/9/1.png',
                    'assets/images/Fun/9/2.png',
                    'assets/images/Fun/9/3.png',
                    'assets/images/Fun/9/4.png',
                    'assets/images/Fun/9/5.png',
                    'assets/images/Fun/9/6.png',

                ],
            },
        ];

        const wrap  = document.getElementById('wrap');
        const strip = document.getElementById('strip');
        let setWidth = 0;
        let activeIdx = 5; // start at Familihear (index 5)
        let wheelLocked = false;

        /* Fixed stage position: where the enlarged image always lands (center of wrap) */
        // 0 = left edge, 0.5 = center, 1 = right edge — different per breakpoint
        const isMobileLayout = window.matchMedia('(max-width: 768px)').matches;
        const STAGE_X    = isMobileLayout ? 0.43 : 0.30;
        const EXPANDED_W = isMobileLayout ? 240  : 360; // must match .film-item.active width in CSS
        const DEFAULT_W  = isMobileLayout ? 120  : 160; // must match .film-item default width in CSS

        function scrollToActive() {
            const n = SOURCES.length;
            const gap = isMobileLayout ? 8 : 12;
            const stageX = wrap.offsetWidth * STAGE_X;

            // Calculate final item position purely from index — avoids mid-transition DOM errors
            // One set = n items at DEFAULT_W with (n-1) gaps between them
            const oneSetWidth = n * DEFAULT_W + (n - 1) * gap;
            const numCopies = 2;

            // Pick the copy whose active item is closest to current scroll center
            let bestCopy = 0;
            let bestDist = Infinity;
            for (let c = 0; c < numCopies; c++) {
                const itemLeft = c * oneSetWidth + activeIdx * (DEFAULT_W + gap);
                const dist = Math.abs(itemLeft + EXPANDED_W / 2 - (wrap.scrollLeft + stageX));
                if (dist < bestDist) { bestDist = dist; bestCopy = c; }
            }

            const itemLeft = bestCopy * oneSetWidth + activeIdx * (DEFAULT_W + gap);
            const scrollTarget = itemLeft + EXPANDED_W / 2 - stageX;

            if (isMobileLayout) {
                wrap.scrollLeft = scrollTarget;
            } else {
                wrap.scrollTo({ left: scrollTarget, behavior: 'smooth' });
            }
        }

        function setActive(idx) {
            const n = SOURCES.length;
            activeIdx = ((idx % n) + n) % n;
            strip.querySelectorAll('.film-item').forEach((el, i) => {
                el.classList.toggle('active', i % n === activeIdx);
            });
            scrollToActive();
        }

        /* ── Build strip: single pass, no loop ── */
        function buildStrip(order) {
            strip.innerHTML = '';
            for (let copy = 0; copy < 2; copy++) {
                order.forEach(({ src, title, meta, desc, images }) => {
                    const div = document.createElement('div');
                    div.className       = 'film-item';
                    div.dataset.src     = src;
                    div.dataset.title   = title;
                    div.dataset.meta    = meta;
                    div.dataset.desc    = desc || '';
                    div.dataset.images  = JSON.stringify(images && images.length ? images : [src]);

                    const img = document.createElement('img');
                    img.src       = src;
                    img.alt       = title;
                    img.draggable = false;

                    const cap = document.createElement('div');
                    cap.className = 'film-caption';

                    const capTitle = document.createElement('span');
                    capTitle.className   = 'cap-title';
                    capTitle.textContent = title;

                    const capMeta = document.createElement('span');
                    capMeta.className   = 'cap-meta';
                    capMeta.textContent = meta;

                    const thumb = document.createElement('div');
                    thumb.className = 'film-thumb';
                    thumb.appendChild(img);

                    cap.appendChild(capTitle);
                    cap.appendChild(capMeta);
                    div.appendChild(thumb);
                    div.appendChild(cap);
                    strip.appendChild(div);
                });
            }
            requestAnimationFrame(() => {
                setWidth = strip.scrollWidth;
                wrap.scrollLeft = 0;
                requestAnimationFrame(() => setActive(activeIdx));
            });
        }

        buildStrip(SOURCES);


        /* ── Drag to scroll ── */
        let dragging = false, startX = 0, startScroll = 0;

        wrap.addEventListener('mousedown', e => {
            dragging = true;
            startX = e.pageX;
            startScroll = wrap.scrollLeft;
            wrap.classList.add('dragging');
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            wrap.scrollLeft = startScroll - (e.pageX - startX);
        });
        document.addEventListener('mouseup', () => {
            dragging = false;
            wrap.classList.remove('dragging');
        });

        /* ── Hover tracking: suppress active state while hovering another image ── */
        strip.addEventListener('mouseover', e => {
            if (e.target.closest('.film-item')) wrap.classList.add('item-hovered');
        });
        strip.addEventListener('mouseout', e => {
            if (!e.relatedTarget || !e.relatedTarget.closest('.film-item')) {
                wrap.classList.remove('item-hovered');
            }
        });

        /* ── Scroll wheel → step through images one at a time (desktop only) ── */
        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            if (isMobileLayout) return; // mobile uses tap, not scroll
            if (wheelLocked) return;
            wheelLocked = true;
            const dir = (e.deltaY || e.deltaX) > 0 ? 1 : -1;
            setActive(activeIdx + dir);
            setTimeout(() => { wheelLocked = false; }, 900);
        }, { passive: false });

        /* ── Mobile touch: clear active state while scrolling ── */
        if (isMobileLayout) {
            let touchScrolling = false;
            let touchScrollTimer;
            wrap.addEventListener('touchstart', () => {
                touchScrolling = true;
                clearTimeout(touchScrollTimer);
                strip.querySelectorAll('.film-item').forEach(el => el.classList.remove('active'));
            }, { passive: true });
            wrap.addEventListener('touchend', () => {
                touchScrollTimer = setTimeout(() => { touchScrolling = false; }, 100);
            }, { passive: true });
        }

        /* ── Toggle: Linear ↔ Randoom ── */
        const toggle    = document.getElementById('toggle');
        const lblLinear = document.getElementById('lbl-linear');
        const lblRandom = document.getElementById('lbl-random');

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        toggle.addEventListener('click', () => {
            const isOn = toggle.classList.toggle('on');
            toggle.setAttribute('aria-checked', String(isOn));
            lblLinear.classList.toggle('active', !isOn);
            lblRandom.classList.toggle('active',  isOn);
            buildStrip(isOn ? shuffle(SOURCES) : SOURCES);
        });

        /* ── Lightbox (click to open full image) ── */
        const lightbox = document.getElementById('lightbox');
        const lbTag    = document.getElementById('lb-tag');
        const lbTitle  = document.getElementById('lb-title');
        const lbDesc   = document.getElementById('lb-desc');
        const lbRight  = document.getElementById('lb-right');
        const lbClose  = document.getElementById('lb-close');

        const videoExts = /\.(mp4|webm|mov|ogg)$/i;

        function makeMedia(s, title) {
            if (videoExts.test(s)) {
                const vid = document.createElement('video');
                vid.src         = s;
                vid.controls    = s.includes('vid.mp4');
                vid.autoplay    = true;
                vid.muted       = true;
                vid.loop        = true;
                vid.playsInline = true;
                return vid;
            } else {
                const img = document.createElement('img');
                img.src = s;
                img.alt = title || '';
                return img;
            }
        }

        function openLightbox(item) {
            lbTag.textContent   = item.dataset.meta  || '';
            lbTitle.textContent = item.dataset.title || '';
            lbDesc.textContent  = item.dataset.desc  || '';
            lbRight.innerHTML   = '';
            const imgs = JSON.parse(item.dataset.images || '[]');
            imgs.forEach(entry => {
                if (Array.isArray(entry)) {
                    const row = document.createElement('div');
                    row.className = 'lb-row-2col';
                    entry.forEach(s => row.appendChild(makeMedia(s, item.dataset.title)));
                    lbRight.appendChild(row);
                } else {
                    lbRight.appendChild(makeMedia(entry, item.dataset.title));
                }
            });
            lightbox.classList.add('open');
        }

        strip.addEventListener('click', e => {
            if (dragging) return;
            const item = e.target.closest('.film-item');
            if (!item) return;

            const isMobile = isMobileLayout;

            if (isMobile) {
                const items = [...strip.querySelectorAll('.film-item')];
                const idx = items.indexOf(item) % SOURCES.length;
                if (item.classList.contains('active')) {
                    // already enlarged — open overlay
                    openLightbox(item);
                } else {
                    // first tap — enlarge it
                    setActive(idx);
                }
            } else {
                // desktop — click always opens overlay
                openLightbox(item);
            }
        });

        lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) lightbox.classList.remove('open');
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') lightbox.classList.remove('open');
        });
    })();
    </script>

    <script>
        /* ── Mobile nav ── */
        const mNav     = document.getElementById('m-nav');
        const mMenuBtn = document.querySelector('.m-menu-btn');
        const mClose   = document.getElementById('m-nav-close');
        mMenuBtn.addEventListener('click', () => mNav.classList.add('active'));
        mClose.addEventListener('click',   () => mNav.classList.remove('active'));
    </script>

    <script>
        /* ── Custom cursor: follows mouse, visible only over film items ── */
        const cur = document.querySelector('.cursor');

        document.addEventListener('mousemove', e => {
            cur.style.left = e.clientX + 'px';
            cur.style.top  = e.clientY + 'px';
        });

        document.addEventListener('mouseover', e => {
            if (e.target.closest('.film-item')) cur.classList.add('visible');
        });
        document.addEventListener('mouseout', e => {
            if (!e.relatedTarget || !e.relatedTarget.closest('.film-item')) {
                cur.classList.remove('visible');
            }
        });
    </script>

</body>
</html>
