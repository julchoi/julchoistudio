<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun — julchoistudio.</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%235D4FF6'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { cursor: auto; }

        .cursor {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            position: fixed; top: 0; left: 0;
            pointer-events: none;
            transform: translate(-50%,-50%);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s ease;
        }
        .cursor img { width: 24px; height: 24px; }
        .cursor.visible { opacity: 1; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Geist', sans-serif;
            font-weight: 400; color: #000;
            background-color: #fafcfd;
            background-image:
                linear-gradient(rgba(217,217,217,0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217,217,217,0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-font-smoothing: antialiased;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow-y: scroll;
        }

        a { text-decoration: none; color: inherit; }

        /* ── NAV ── */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 52px;
            border-bottom: 1px solid #e0e0e0;
            background: #fafcfd;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.1rem; font-weight: 600; color: #33363F; }
        .nav-links { display: flex; align-items: center; gap: 2.2rem; }
        .nav-links a {
            font-size: 0.8rem; font-weight: 500; color: #aaa;
            text-transform: uppercase; transition: color 0.2s;
        }
        .nav-links a.active { color: #5D4FF6; }
        .nav-links a:hover  { color: #000; }

        /* ── STAGE ── */
        .stage {
            flex: 1;
            position: relative;
            display: flex;
            align-items: flex-start;   /* vertically center the filmstrip-wrap */
        }

        /* ── FILMSTRIP WRAP ──
           Fixed height so vertical layout expansion doesn't reflow the stage.
           Items grow upward (align-items: flex-end) from a stable baseline.
           overflow-y becomes auto (browser forces it when overflow-x is scroll),
           but the tallest content (360px) fits within 400px so nothing clips. ── */
        .filmstrip-wrap {
            width: calc(100% - 3rem);
            height: 600px;
            display: flex;
            margin-top: 68px;
            margin-left: 1.5rem;
            margin-right: 1.5rem;
            align-items: center;
            overflow-x: scroll;
            overflow-y: hidden;
            cursor: grab;
            user-select: none;
            scrollbar-width: none;
        }
        

        /* ── FILMSTRIP ── */
        .filmstrip {
            display: flex;
            gap: 12px;
            align-items: center;   /* items share the same bottom edge */
            width: max-content;
            flex-shrink: 0;
        }

        /* ── FILM ITEM: expands in layout → pushes siblings sideways ── */
        .film-item {
            flex-shrink: 0;
            width: 160px;
            height: 160px;
            overflow: visible;      /* allow caption to show outside image bounds */
            cursor: pointer;
            position: relative;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1),
                        height 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        .film-item.active {
            width: 360px;
            height: 400px;
        }

        /* hover effect — enlarges whichever image is hovered */
        .film-item:hover {
            width: 360px;
            height: 400px;
        }

        /* when hovering any image, shrink the scroll-active one (unless it's the hovered one) */
        .filmstrip-wrap.item-hovered .film-item.active:not(:hover) {
            width: 160px;
            height: 160px;
        }

        /* wraps the image and clips it to the item size */
        .film-thumb {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .film-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* ── CAPTION — below the image ── */
        .film-caption {
            position: absolute;
            top: 100%;              /* just below the image */
            left: 0; right: 0;
            padding: 0.7rem 0 0;
            background: transparent;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .film-item.active .film-caption,
        .film-item:hover .film-caption {
            opacity: 1;
            transform: translateY(0);
        }

        /* hide active caption when another image is hovered */
        .filmstrip-wrap.item-hovered .film-item.active:not(:hover) .film-caption {
            opacity: 0;
            transform: translateY(4px);
        }

        .cap-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #000;
        }

        .cap-meta {
            font-family: 'Geist Mono', monospace;
            font-size: 0.75rem;
            color: #aaa;
            white-space: nowrap;
        }

        /* ── TOGGLE — pinned to bottom of stage ── */
        .toggle-bar {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.9rem;
            white-space: nowrap;
        }

        .toggle-label {
            font-family: 'Geist Mono', monospace;
            font-size: 0.72rem; font-weight: 400;
            color: #aaa;
            text-transform: uppercase; letter-spacing: 0.08em;
            transition: color 0.25s;
        }
        .toggle-label.active { color: #aaa; }

        .toggle-track {
            width: 80px; height: 24px;
            background: transparent;
            border: 1.5px solid #ccc;
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: border-color 0.25s;
            flex-shrink: 0;
        }
        .toggle-track.on { border-color: #ccc; }

        .toggle-thumb {
            width: 18px; height: 18px;
            background: #b0b0b0;
            border-radius: 50%;
            position: absolute; top: 50%; left: 5px;
            transform: translateY(-50%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .toggle-track.on .toggle-thumb { transform: translateY(-50%) translateX(52px); }

        /* ── OVERLAY ── */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }

        .lb-inner {
            background: #fafcfd;
            width: 80vw;
            height: 78vh;
            display: grid;
            grid-template-columns: 32% 1fr;
            overflow: hidden;
            position: relative;
        }

        /* Left panel — fixed text */
        .lb-left {
            padding: 3rem 2.5rem;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            overflow-y: auto;
        }

        .lb-tag {
            font-family: 'Geist Mono', monospace;
            font-size: 0.72rem;
            color: #aaa;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .lb-title {
            font-size: 2.8rem;
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: -0.03em;
            color: #33363F;
        }

        .lb-rule {
            border: none;
            border-top: 1px solid #e0e0e0;
        }

        .lb-desc {
            font-size: 0.85rem;
            line-height: 1.75;
            color: #666;
        }

        /* Right panel — scrollable images */
        .lb-right {
            overflow-y: scroll;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .lb-right img,
        .lb-right video {
            width: 100%;
            height: auto;
            display: block;
        }

        .lb-row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .lb-close {
            position: absolute; top: 1.2rem; right: 1.5rem;
            background: #fff; border: none;
            color: #aaa; font-size: 1.1rem;
            cursor: pointer; z-index: 10;
            transition: color 0.2s, background 0.2s; line-height: 1;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-close:hover { color: #000; background: #f0f0f0; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .nav-links   { display: none; }
            .filmstrip-wrap { height: 260px; }
            .film-item   { width: 120px; height: 120px; }
            .film-item:hover { width: 240px; height: 240px; }
            .filmstrip   { gap: 8px; }
            .toggle-bar  { bottom: 2rem; }
        }
    </style>
</head>
<body>

    <div class="cursor">
        <img src="assets/images/icons/rightdiaarrow.png" alt="">
    </div>

    <!-- NAV -->
    <nav>
        <a href="home.html" class="logo">julchoistudio.</a>
        <div class="nav-links">
            <a href="home.html">Work</a>
            <a href="fun.html" class="active">Fun</a>
            <a href="#">About</a>
            <a href="#">Resume</a>
        </div>
    </nav>

    <!-- STAGE -->
    <main class="stage">

        <div class="filmstrip-wrap" id="wrap">
            <div class="filmstrip" id="strip">
                <!-- items injected by JS -->
            </div>
        </div>

        <!-- TOGGLE -->
        <div class="toggle-bar">
            <span class="toggle-label active" id="lbl-linear">Linear</span>
            <div class="toggle-track" id="toggle" role="switch" aria-checked="false">
                <div class="toggle-thumb"></div>
            </div>
            <span class="toggle-label" id="lbl-random">Randoom</span>
        </div>

    </main>

    <!-- RIGHT SCROLLBAR -->
    <div class="page-scrollbar" id="page-scrollbar">
        <div class="page-thumb" id="page-thumb"></div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <div class="lb-inner">
            <div class="lb-left">
                <p class="lb-tag" id="lb-tag"></p>
                <h2 class="lb-title" id="lb-title"></h2>
                <hr class="lb-rule">
                <p class="lb-desc" id="lb-desc"></p>
            </div>
            <div class="lb-right" id="lb-right"></div>
        </div>
        <button class="lb-close" id="lb-close">✕</button>
    </div>

    <script>
    (() => {
        /* ── Source images — update title / meta to match your work ── */
        const SOURCES = [
            {
                src: 'assets/images/Fun/1.png', title: 'COMM DSGN', meta: 'BRANDING · 2023',
                desc: 'A branding project for COMM DSGN exhibition, exploring consistent visual identity and brand systems with minimal and black & white look.',
                images: [
                    'assets/images/Fun/1/Main.png',
                    // 'assets/images/Fun/1b.png',   ← add more overlay images here
                ],
            },
            {
                src: 'assets/images/Fun/2.png', title: 'New York Times Redesign', meta: 'EDITORIAL · 2023',
                desc: 'An editorial rebuild & redesign of the New York Times magazine spread, rethinking layout and typographic hierarchy.',
                images: [
                    'assets/images/Fun/2/Main.png',
                    'assets/images/Fun/2/1.png',
                    'assets/images/Fun/2/2.png',
                ],
            },
            {
                src: 'assets/images/Fun/3.png', title: 'mondayagain', meta: 'BRANDING · 2026',
                desc: 'Brand identity for mondayagain, a modern brand designed for women in their mid 20s to 30s living 9–5 life.',
                images: [
                    'assets/images/Fun/3/1.png',
                    'assets/images/Fun/3/2.png',
                    'assets/images/Fun/3/3.png',
                    'assets/images/Fun/3/1.mp4',
                    'assets/images/Fun/3/4.png',
                ],
            },
            {
                src: 'assets/images/Fun/4.png', title: 'Moody Series', meta: 'MOTION · 2025',
                desc: 'A motion series in three parts, each exploring a distinct mood through animation: 1. Anxious 2 .Saunter and 3. Hesitation.',
                images: [
                ['assets/images/Fun/4/1.mp4', 'assets/images/Fun/4/2.mp4'],
                ['assets/images/Fun/4/3.mp4','assets/images/Fun/4/1.png',]

                ],
            },
            {
                src: 'assets/images/Fun/5.png', title: 'SOLE Magazine', meta: 'EDITORIAL · 2024',
                desc: 'Editorial design for SOLE Magazine, a publication at the intersection of geography and global issues—examining climate, culture, and the shifting conditions of our world.',
                images: [
                    'assets/images/Fun/5/Main.png',
                    'assets/images/Fun/5/1.png',
                    'assets/images/Fun/5/2.png',
                    'assets/images/Fun/5/3.png',
                ],
            },
            {
                src: 'assets/images/Fun/6.png', title: 'Familihear', meta: 'SVA HACKATHON · 2025',
                desc: 'An AI-powered communication platform designed to help immigrant families truly understand each other by translating not only language, but also tone, emotion, and cultural meaning.',
                images: [
                    'assets/images/Fun/6/vid1.mov',
                    'assets/images/Fun/6/1-1.png',
                    'assets/images/Fun/6/1.png',
                    'assets/images/Fun/6/vid.mp4',
                    'assets/images/Fun/6/4.png',
                    'assets/images/Fun/6/5.png',
                    'assets/images/Fun/6/6.png',
                    'assets/images/Fun/6/vid3.mov',
                    'assets/images/Fun/6/vid2.mp4',
                    'assets/images/Fun/6/11.png',
                    'assets/images/Fun/6/Main.png',
                ],
            },
            {
                src: 'assets/images/Fun/7.png', title: 'MORII', meta: 'EDITORIAL · 2025',
                desc: 'MORII captures fleeting moments through thoughtfully curated unique interiors. The magazine design includes main spreads and 2 different feature pages.',
                images: [
                    'assets/images/Fun/7/Main.png',
                    'assets/images/Fun/7/1-1.png',
                    'assets/images/Fun/7/3.jpg',
                    'assets/images/Fun/7/1.png',
                    'assets/images/Fun/7/2.png',
                    'assets/images/Fun/7/3.png',
                ],
            },
            {
                src: 'assets/images/Fun/8.png', title: 'AHOLE', meta: 'TYPEFACE · 2024',
                desc: 'Introducing a custom typeface, ”AHOLE,” a revolutionary interpretation of a square yet circular typeface. Typically, the term “A-hole” is employed as an expletive. However, in this context, it assumes a dual significance.',
                images: [
                    'assets/images/Fun/8/Main.png',
                    'assets/images/Fun/8/3-3.png',
                    'assets/images/Fun/8/1.png',
                    'assets/images/Fun/8/2.png',
                    'assets/images/Fun/8/3.png',
                    'assets/images/Fun/8/4.png',
                ],
            },
            {
                src: 'assets/images/Fun/9.png', title: 'Un-Algorithmic', meta: 'TAROT CARDS · 2026',
                desc: 'An un-algorithmic tarot card series designed as a counter-narrative to algorithmic prediction and digital fate.',
                images: [
                    'assets/images/Fun/9/Main.png',
                    'assets/images/Fun/9/1.png',
                    'assets/images/Fun/9/2.png',
                    'assets/images/Fun/9/3.png',
                    'assets/images/Fun/9/4.png',
                    'assets/images/Fun/9/5.png',
                    'assets/images/Fun/9/6.png',

                ],
            },
        ];

        const wrap  = document.getElementById('wrap');
        const strip = document.getElementById('strip');
        let setWidth = 0;
        let activeIdx = 5; // start at Familihear (index 5)
        let wheelLocked = false;

        /* Fixed stage position: where the enlarged image always lands (center of wrap) */
        const STAGE_X = 0.30; // 0 = left edge, 0.5 = center, 1 = right edge
        const EXPANDED_W = 360; // must match .film-item.active width in CSS
        const DEFAULT_W  = 160; // must match .film-item default width in CSS

        function scrollToActive() {
            const n = SOURCES.length;
            const items = [...strip.querySelectorAll('.film-item')];
            const activeItems = items.filter((_, i) => i % n === activeIdx);
            const stageX = wrap.offsetWidth * STAGE_X; // fixed pixel position in wrap

            // find the copy of the active item closest to current scroll center
            const scrollCenter = wrap.scrollLeft + stageX;
            let best = activeItems[0];
            let bestDist = Infinity;
            activeItems.forEach(el => {
                // item's absolute left in scroll-space (scroll-independent)
                const itemScrollLeft = el.getBoundingClientRect().left
                    - wrap.getBoundingClientRect().left
                    + wrap.scrollLeft;
                const dist = Math.abs(itemScrollLeft + DEFAULT_W / 2 - scrollCenter);
                if (dist < bestDist) { bestDist = dist; best = el; }
            });
            if (!best) return;

            // calculate where to scroll so the expanded item sits exactly at stageX
            const itemScrollLeft = best.getBoundingClientRect().left
                - wrap.getBoundingClientRect().left
                + wrap.scrollLeft;
            const scrollTarget = itemScrollLeft + EXPANDED_W / 2 - stageX;
            wrap.scrollTo({ left: scrollTarget, behavior: 'smooth' });
        }

        function setActive(idx) {
            const n = SOURCES.length;
            activeIdx = ((idx % n) + n) % n;
            strip.querySelectorAll('.film-item').forEach((el, i) => {
                el.classList.toggle('active', i % n === activeIdx);
            });
            scrollToActive();
        }

        /* ── Build strip: single pass, no loop ── */
        function buildStrip(order) {
            strip.innerHTML = '';
            for (let copy = 0; copy < 2; copy++) {
                order.forEach(({ src, title, meta, desc, images }) => {
                    const div = document.createElement('div');
                    div.className       = 'film-item';
                    div.dataset.src     = src;
                    div.dataset.title   = title;
                    div.dataset.meta    = meta;
                    div.dataset.desc    = desc || '';
                    div.dataset.images  = JSON.stringify(images && images.length ? images : [src]);

                    const img = document.createElement('img');
                    img.src       = src;
                    img.alt       = title;
                    img.draggable = false;

                    const cap = document.createElement('div');
                    cap.className = 'film-caption';

                    const capTitle = document.createElement('span');
                    capTitle.className   = 'cap-title';
                    capTitle.textContent = title;

                    const capMeta = document.createElement('span');
                    capMeta.className   = 'cap-meta';
                    capMeta.textContent = meta;

                    const thumb = document.createElement('div');
                    thumb.className = 'film-thumb';
                    thumb.appendChild(img);

                    cap.appendChild(capTitle);
                    cap.appendChild(capMeta);
                    div.appendChild(thumb);
                    div.appendChild(cap);
                    strip.appendChild(div);
                });
            }
            requestAnimationFrame(() => {
                setWidth = strip.scrollWidth;
                wrap.scrollLeft = 0;
                requestAnimationFrame(() => setActive(activeIdx));
            });
        }

        buildStrip(SOURCES);


        /* ── Drag to scroll ── */
        let dragging = false, startX = 0, startScroll = 0;

        wrap.addEventListener('mousedown', e => {
            dragging = true;
            startX = e.pageX;
            startScroll = wrap.scrollLeft;
            wrap.classList.add('dragging');
        });
        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            wrap.scrollLeft = startScroll - (e.pageX - startX);
        });
        document.addEventListener('mouseup', () => {
            dragging = false;
            wrap.classList.remove('dragging');
        });

        /* ── Hover tracking: suppress active state while hovering another image ── */
        strip.addEventListener('mouseover', e => {
            if (e.target.closest('.film-item')) wrap.classList.add('item-hovered');
        });
        strip.addEventListener('mouseout', e => {
            if (!e.relatedTarget || !e.relatedTarget.closest('.film-item')) {
                wrap.classList.remove('item-hovered');
            }
        });

        /* ── Scroll wheel → step through images one at a time ── */
        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            if (wheelLocked) return;
            wheelLocked = true;
            const dir = (e.deltaY || e.deltaX) > 0 ? 1 : -1;
            setActive(activeIdx + dir);
            setTimeout(() => { wheelLocked = false; }, 900);
        }, { passive: false });

        /* ── Toggle: Linear ↔ Randoom ── */
        const toggle    = document.getElementById('toggle');
        const lblLinear = document.getElementById('lbl-linear');
        const lblRandom = document.getElementById('lbl-random');

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        toggle.addEventListener('click', () => {
            const isOn = toggle.classList.toggle('on');
            toggle.setAttribute('aria-checked', String(isOn));
            lblLinear.classList.toggle('active', !isOn);
            lblRandom.classList.toggle('active',  isOn);
            buildStrip(isOn ? shuffle(SOURCES) : SOURCES);
        });

        /* ── Lightbox (click to open full image) ── */
        const lightbox = document.getElementById('lightbox');
        const lbTag    = document.getElementById('lb-tag');
        const lbTitle  = document.getElementById('lb-title');
        const lbDesc   = document.getElementById('lb-desc');
        const lbRight  = document.getElementById('lb-right');
        const lbClose  = document.getElementById('lb-close');

        strip.addEventListener('click', e => {
            if (dragging) return;
            const item = e.target.closest('.film-item');
            if (!item) return;
            lbTag.textContent   = item.dataset.meta  || '';
            lbTitle.textContent = item.dataset.title || '';
            lbDesc.textContent  = item.dataset.desc  || '';
            lbRight.innerHTML = '';
            const imgs = JSON.parse(item.dataset.images || '[]');
            const videoExts = /\.(mp4|webm|mov|ogg)$/i;

            function makeMedia(s) {
                if (videoExts.test(s)) {
                    const vid = document.createElement('video');
                    vid.src         = s;
                    vid.controls    = s.includes('vid.mp4');
                    vid.autoplay    = true;
                    vid.muted       = true;
                    vid.loop        = true;
                    vid.playsInline = true;
                    return vid;
                } else {
                    const img = document.createElement('img');
                    img.src = s;
                    img.alt = item.dataset.title || '';
                    return img;
                }
            }

            imgs.forEach(entry => {
                if (Array.isArray(entry)) {
                    const row = document.createElement('div');
                    row.className = 'lb-row-2col';
                    entry.forEach(s => row.appendChild(makeMedia(s)));
                    lbRight.appendChild(row);
                } else {
                    lbRight.appendChild(makeMedia(entry));
                }
            });
            lightbox.classList.add('open');
        });

        lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) lightbox.classList.remove('open');
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') lightbox.classList.remove('open');
        });
    })();
    </script>

    <script>
        /* ── Custom cursor: follows mouse, visible only over film items ── */
        const cur = document.querySelector('.cursor');

        document.addEventListener('mousemove', e => {
            cur.style.left = e.clientX + 'px';
            cur.style.top  = e.clientY + 'px';
        });

        document.addEventListener('mouseover', e => {
            if (e.target.closest('.film-item')) cur.classList.add('visible');
        });
        document.addEventListener('mouseout', e => {
            if (!e.relatedTarget || !e.relatedTarget.closest('.film-item')) {
                cur.classList.remove('visible');
            }
        });
    </script>

</body>
</html>
